services:
  app:
    build: .
    container_name: laravel-prod-app
    restart: always
    env_file: .env
    volumes:
      - laravel_storage:/var/www/storage/app
      - laravel_public_build:/var/www/public/build
    networks:
      - backend

  webserver:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - laravel_storage:/var/www/storage/app
      - laravel_public_build:/var/www/public/build
      - nginx_logs:/var/log/nginx
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - backend
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: production-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  filebeat:
    image: docker.elastic.co/beats/filebeat:9.3.1
    container_name: filebeat
    user: root
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    networks:
      - backend
    depends_on:
      - webserver 

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
  laravel_storage:
  laravel_public_build: 
  nginx_logs: